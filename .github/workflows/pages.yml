name: Deploy to GitHub Pages

# Static site, no build step: just publish the repo root as-is.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp cache-busting build ID
        # index.html's entry script tag carries a __BUILD__ placeholder
        # (see index.html and js/main.js) rather than a hand-maintained
        # version number — replacing it here with the actual build time
        # means the whole JS module graph is guaranteed to bust its cache
        # on every deploy, with nothing to remember to keep in sync.
        run: sed -i "s/__BUILD__/$(date +%s)/" index.html
      - uses: actions/configure-pages@v5
        with:
          # Create the Pages site automatically if it doesn't exist yet —
          # without this, configure-pages just looks one up and fails.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # Without this, re-running a failed attempt of the same workflow
          # run (rather than pushing a fresh commit) leaves the previous
          # attempt's artifact in place, and this step's fresh upload then
          # collides with it — deploy-pages then refuses to pick one,
          # failing with "Multiple artifacts named 'github-pages' were
          # unexpectedly found for this workflow run." Observed twice.
          overwrite: true
      - id: deployment
        uses: actions/deploy-pages@v4
