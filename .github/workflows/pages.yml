name: Deploy to GitHub Pages

# Static site, no build step: just publish the repo root as-is.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp cache-busting build ID
        # index.html's entry script tag carries a __BUILD__ placeholder
        # (see index.html and js/main.js) rather than a hand-maintained
        # version number — replacing it here with the actual build time
        # means the whole JS module graph is guaranteed to bust its cache
        # on every deploy, with nothing to remember to keep in sync.
        run: sed -i "s/__BUILD__/$(date +%s)/" index.html
      - uses: actions/configure-pages@v5
        with:
          # Create the Pages site automatically if it doesn't exist yet —
          # without this, configure-pages just looks one up and fails.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # NOTE: tried adding `overwrite: true` here to stop a re-run of a
          # failed attempt from colliding with the previous attempt's
          # leftover artifact ("Multiple artifacts named 'github-pages'
          # were unexpectedly found for this workflow run", observed
          # twice) — but this action doesn't expose that input (only
          # name/path/retention-days; GitHub just warns and ignores it).
          # Avoid using "Re-run failed jobs" on this workflow in the
          # GitHub UI; push a new commit instead, which always starts a
          # clean run with no leftover artifact to collide with.
      - id: deployment
        uses: actions/deploy-pages@v4
