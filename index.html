<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vital Seeds packet scanner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Vital Seeds</h1>
    <p>Point your camera at a vital seeds packet to learn more about the seeds.</p>
  </header>

  <main>
    <div class="camera-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <button id="scanBtn">Scan</button>
    <p id="status" role="status"></p>

    <section id="result" hidden>
      <h2><a id="resultLink" target="_blank" rel="noopener"></a></h2>
      <p>SKU: <span id="resultSku">—</span></p>
      <div class="result-crops">
        <div>
          <p class="crop-label">Title crop</p>
          <img id="resultTitleThumb" alt="Cropped title region" />
        </div>
        <div>
          <p class="crop-label">SKU crop</p>
          <img id="resultThumb" alt="Cropped SKU region" />
        </div>
      </div>
      <p>Raw title text: <code id="resultTitleRaw"></code></p>
      <p>Raw SKU text: <code id="resultRaw"></code></p>
    </section>
  </main>

  <!-- Bumped in js/config.js and tagged on main at merge time, so you can
       tell which deploy you're looking at. -->
  <footer>
    <small>v<span id="version"></span></small>
    ·
    <!-- Dev convenience: reloads with a cache-busting query param based on
         the current time, in case a CDN/browser is still serving a stale
         cached copy of the page itself (separate from __BUILD__ above,
         which busts the cache for its scripts, not the HTML document). -->
    <a id="refreshLink" href="?t=0">refresh</a>
  </footer>

  <!-- OpenCV.js: provides contour detection + perspective transforms -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <!-- Tesseract.js: provides OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- __BUILD__ is replaced with a Unix timestamp by the deploy workflow
       (.github/workflows/pages.yml), not hand-maintained. js/main.js
       reuses this same query string when it imports its own sibling
       modules, so every deploy forces a fresh fetch of the *whole* module
       graph automatically — without it, a browser can keep serving old
       cached JS indefinitely even after index.html itself reloads.
       Opened locally (no workflow), this is just left as the literal
       string "__BUILD__", which is harmless — still a valid, if static,
       cache-bust value. -->
  <script type="module" src="js/main.js?v=__BUILD__"></script>
</body>
</html>
