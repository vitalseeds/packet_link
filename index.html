<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vital Seeds packet scanner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Vital Seeds</h1>
    <p>Point your camera at a vital seeds packet to learn more about the seeds.</p>
  </header>

  <main>
    <div class="camera-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <button id="scanBtn">Start scanning</button>
    <p id="status" role="status"></p>

    <section id="result" hidden>
      <h2>
        SKU:
        <a id="resultSkuLink" target="_blank" rel="noopener"
          ><span id="resultSku">—</span></a
        >
        <button
          id="infoBtn"
          type="button"
          class="info-btn"
          aria-expanded="false"
          aria-label="Show scan details"
          title="Show scan details"
        >
          i
        </button>
      </h2>
      <div id="resultDetails" hidden>
        <img id="resultThumb" alt="Cropped SKU region" />
        <p>Raw OCR text: <code id="resultRaw"></code></p>
      </div>
    </section>
  </main>

  <!-- Bumped alongside CONFIG.VERSION in js/config.js and tagged on main at
       merge time, so you can tell which deploy you're looking at. -->
  <footer>
    <small>v<span id="version"></span></small>
    ·
    <!-- Dev convenience: reloads with a cache-busting query param, in case
         a CDN/browser is still serving a stale cached copy of the page. -->
    <a id="refreshLink" href="?v=0">refresh</a>
  </footer>

  <!-- OpenCV.js: provides contour detection + perspective transforms -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <!-- Tesseract.js: provides OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- The ?v= here must match VERSION in js/config.js (see README ->
       Versioning). js/main.js reuses this same query string when it
       imports its own sibling modules, so bumping this one number forces
       a fresh fetch of the *whole* module graph on the next deploy —
       without it, a browser can keep serving old cached JS indefinitely
       even after index.html itself reloads. -->
  <script type="module" src="js/main.js?v=0.3.2"></script>
</body>
</html>
